name: Release

# Triggers when a version tag is pushed: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  build-exe:
    name: Build Windows EXE (no-upscale)
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Parse version from tag ────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Node.js (build React frontend) ────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build

      # ── Python (PyInstaller) ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywin32
          pip install "pyinstaller>=6.0"

      # ── Build exe ─────────────────────────────────────────────────────────
      - name: Run PyInstaller
        run: pyinstaller livery_ai_studio.spec --noconfirm

      # ── Package distribution ──────────────────────────────────────────────
      - name: Create release zip
        shell: pwsh
        run: |
          $distDir = Get-ChildItem -Path dist -Directory | Select-Object -First 1
          $zipName = "$($distDir.Name).zip"
          Compress-Archive -Path "$($distDir.FullName)\*" -DestinationPath "dist/$zipName"
          Write-Output "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          Write-Output "ZIP_PATH=dist/$zipName" >> $env:GITHUB_ENV

      # ── Create GitHub release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Livery AI Studio v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md
          draft: true          # Set to false to publish immediately
          prerelease: false
          files: ${{ env.ZIP_PATH }}
